version: "3.9"

services:
  # --- Database ---
  postgres:
    image: postgres:16-alpine
    container_name: edusaas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: edusaas_user
      POSTGRES_PASSWORD: edusaas_password
      POSTGRES_DB: edusaas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edusaas_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache (The fix for your connection error) ---
  redis:
    image: redis:7-alpine
    container_name: edusaas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Pro-tip: Match this password in your .env
    command: redis-server --requirepass edusaas_redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "edusaas_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Database Management ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: edusaas_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: dammybeo@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # --- Your SMS API (Optional but Recommended) ---
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: edusaas_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
